<h2>Paginas</h2>

<hr/>
<h3>Auth</h3>
<ul class="list-group">
    @for (item of authMenu; track item.title){
        <li 
            [routerLink] = "item.route"
            routerLinkActive = "active"
            class="list-group-item">
            {{item.title}}
        </li>
    }
</ul>
