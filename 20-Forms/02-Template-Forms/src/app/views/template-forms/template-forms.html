
<pre>{{ applicantForm | json }}</pre>

<form autocomplete="off" #form="ngForm" (submit)="handleSubmit(form)" [ngFormOptions]="{ updateOn: 'blur' }">
    <h2>Job Application</h2>
    <div class="form-control">
        <label for="first-name">First Name:</label>
        <input type="text" id="first-name" placeholder="First Name" 
            [(ngModel)]="applicantForm.firstName" [ngModelOptions]="{name: 'first-name', updateOn: 'blur' }">
    </div>

    <div class="form-control">
        <label for="last-name">Last Name:</label>
        <input type="text" id="last-name" name="lastName" placeholder="Last Name" [(ngModel)]="applicantForm.lastName">
    </div>

    <div class="form-control">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Email" [(ngModel)]="applicantForm.email">
    </div>

    <div class="radio-group">
        What your current employment status?
        <div class="form-radio-control">
            <input type="radio" id="employed" name="employmentStatus" value="employed" [(ngModel)]="applicantForm.employmentStatus">
            <label for="employed">Employed</label>
        </div>
        <div class="form-radio-control">
            <input type="radio" id="unemployed" name="employmentStatus" value="unemployed" [(ngModel)]="applicantForm.employmentStatus">
            <label for="unemployed">Unemployed</label>
        </div>
        <div class="form-radio-control">
            <input type="radio" id="self-employed" name="employmentStatus" value="self-employed" [(ngModel)]="applicantForm.employmentStatus">
            <label for="self-employed">Self-Employed</label>
        </div>
        <div class="form-radio-control">
            <input type="radio" id="student" name="employmentStatus" value="student" [(ngModel)]="applicantForm.employmentStatus">
            <label for="student">Student</label>
        </div>
    </div>

    <div class="form-control">
        <label for="open-position">What position are you applying for?</label>
        <select id="open-position" [(ngModel)]="applicantForm.position" name="open-position">
            <option value="frontend-developer">Frontend Developer</option>
            <option value="backend-developer">Backend Developer</option>
            <option value="fullstack-developer">Fullstack Developer</option>
            <option value="designer">Designer</option>
        </select>
    </div>

    <div class="form-control">
        <label for="resume-link">Resume Link:</label>
        <input type="url" id="resume-link" name="resumeLink" placeholder="Resume Link" [(ngModel)]="applicantForm.resumeLink">
    </div>

    <div class="form-action">
        <button class="btn btn-secondary" type="submit">Reset Application</button>
        <button class="btn btn-primary" type="submit">Submit Application</button>
    </div>
</form>
