<app-title title="Defer Triggers" />

<section>
    @defer (on interaction){
        <app-heavy-loaders-fast cssClass="bg bg-green-500 h-20">
            <span>On Interaction</span>
        </app-heavy-loaders-fast>
    } @placeholder{
        <div class="w-full h20 bg-purple-100">Click</div>
    }
</section>

<hr/>

<section>
    <button #btnInteraction class="p-2 bg-blue-400 hover:bg-blue-700">Click</button>
    @defer (on interaction (btnInteraction)){
        <app-heavy-loaders-fast cssClass="bg bg-green-500 h-20">
            <span>On Interaction</span>
        </app-heavy-loaders-fast>
    } @placeholder{
        <div class="w-full h20 bg-purple-100">Placeholder</div>
    }
</section>
