<app-title title="Defer Views"></app-title>

<section class="grid grid-cols-1">
    @defer(){
        <app-heavy-loaders-slow cssClass="bg-blue-500"></app-heavy-loaders-slow>
    } @placeholder {
        <p class="h-[600px] w-full bg-gradient-to-r from-gray-200 to-gray-400 animate-pulse">Cargando .... </p>
    }

    <!-- Se dispara cuando el navegador llega a un estado inactivo -->
    @defer(on idle){
        <app-heavy-loaders-slow cssClass="bg-blue-500"></app-heavy-loaders-slow>
    } @placeholder {
        <p class="h-[600px] w-full bg-gradient-to-r from-gray-200 to-gray-400 animate-pulse">Cargando .... </p>
    }

    <!-- Se dispara cuando el bloque entra al punto de vista del usuario -->
    @defer(on viewport){
        <app-heavy-loaders-slow cssClass="bg-blue-500"></app-heavy-loaders-slow>
    } @placeholder {
        <p class="h-[600px] w-full bg-gradient-to-r from-gray-200 to-gray-400 animate-pulse">Cargando .... </p>
    }
</section>
